name: Extension BVT

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/vscode-extension/**'
      - '.github/workflows/extension_bvt.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/vscode-extension
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Verify compilation output
        run: |
          if [ ! -f "out/extension.js" ]; then
            echo "Error: extension.js not found in out/ directory"
            exit 1
          fi
          echo "✓ Extension compiled successfully"
          ls -lh out/

      - name: Run tests
        run: npm test
