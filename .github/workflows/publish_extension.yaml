name: Publish Extension to Marketplace

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish Extension
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX from latest release_prod
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: release_prod.yaml
          workflow_conclusion: success
          name: vscode-extension-vsix
          path: extension-artifact
          check_artifacts: true
          search_artifacts: true

      - name: Display downloaded files
        run: ls -R extension-artifact

      - name: Find VSIX file
        id: find_vsix
        run: |
          VSIX_PATH=$(find extension-artifact -name "*.vsix" | head -n 1)
          if [ -z "$VSIX_PATH" ]; then
            echo "No .vsix file found in extension-artifact"
            exit 1
          fi
          echo "Found VSIX: $VSIX_PATH"
          echo "vsix_path=$VSIX_PATH" >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.MARKETPLACE_PAT }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.find_vsix.outputs.vsix_path }}
