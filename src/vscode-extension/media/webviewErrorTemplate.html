<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQ Request Error</title>
    <style>
        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--vscode-foreground);
            background-color: var(--vscode-editor-background);
            padding: 20px;
            line-height: 1.6;
        }

        .header {
            border-bottom: 2px solid var(--vscode-panel-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .request-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .request-info {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .method {
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            background-color: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
        }

        .url {
            font-family: var(--vscode-editor-font-family);
            color: var(--vscode-textLink-foreground);
        }

        .section {
            margin: 25px 0;
        }

        .section-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            color: var(--vscode-foreground);
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:hover {
            color: var(--vscode-textLink-foreground);
        }

        .section-title::before {
            content: '▼ ';
            display: inline-block;
            transition: transform 0.2s;
            margin-right: 6px;
        }

        .section-title.collapsed::before {
            transform: rotate(-90deg);
        }

        .section-content {
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .section-content.collapsed {
            max-height: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--vscode-editor-font-family);
        }

        td {
            padding: 6px 10px;
            border: 1px solid var(--vscode-panel-border);
        }

        .header-key {
            font-weight: bold;
            width: 30%;
            background-color: var(--vscode-editor-inactiveSelectionBackground);
        }

        .header-value {
            font-family: var(--vscode-editor-font-family);
            word-break: break-all;
        }

        .error-label {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #cf222e;
        }

        .error-message {
            background-color: var(--vscode-inputValidation-errorBackground, rgba(207, 34, 46, 0.1));
            border: 1px solid #cf222e;
            border-radius: 4px;
            padding: 15px;
            font-family: var(--vscode-editor-font-family);
            font-size: var(--vscode-editor-font-size);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .run-again-btn {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            padding: 6px 12px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--vscode-font-family);
            font-weight: bold;
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .run-again-btn:hover {
            background-color: var(--vscode-button-hoverBackground);
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="request-name">{{REQUEST_NAME}}</div>
            <button class="run-again-btn" onclick="runAgain()" title="Run this request again">
                <span>&#x21bb;</span> Run Again
            </button>
        </div>
        {{REQUEST_INFO}}
    </div>

    {{HEADERS_SECTION}}

    <div class="section">
        <div class="error-label">Error</div>
        <div class="error-message">{{ERROR_MESSAGE}}</div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        function runAgain() {
            vscode.postMessage({ command: 'runAgain' });
        }

        function toggleSection(element) {
            element.classList.toggle('collapsed');
            const content = element.nextElementSibling;
            content.classList.toggle('collapsed');
        }
    </script>
</body>

</html>
